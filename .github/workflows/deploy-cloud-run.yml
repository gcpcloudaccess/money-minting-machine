name: Deploy to Cloud Run


on:
  push:
    branches: [master]
  workflow_dispatch: {}

env:
  PROJECT_ID: money-minting-machine
  REGION: asia-south1
  AR_REPO: money-minting-machine
  BACKEND_SERVICE: money-minting-machine-backend
  FRONTEND_SERVICE: money-minting-machine-frontend

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ---------------------------------------------------------------- backend
      - name: Build backend image
        run: |
          docker build -f backend/Dockerfile \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/backend:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/backend:latest \
            .

      - name: Push backend image
        run: docker push --all-tags ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/backend

      - name: Deploy backend to Cloud Run
        id: deploy_backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/backend:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --min-instances=1
            --max-instances=1
            --memory=1Gi
            --cpu=1
            --timeout=600
          # overwrite (not the default merge) so a stale env var/secret left over
          # from an earlier failed deploy attempt (e.g. the WATCHLIST-splitting
          # bug, or the unversioned OPENAI_API_KEY/NEWSAPI_KEY refs) can never
          # persist on the service forever just because a later run stopped
          # mentioning it - every deploy fully reconciles to exactly this list.
          env_vars_update_strategy: overwrite
          secrets_update_strategy: overwrite
          env_vars: |
            LLM_PROVIDER=anthropic
            ANTHROPIC_MODEL=claude-sonnet-5
            DATA_MODE=live
            REPLAY_EXCHANGE=NSE
            STARTING_CAPITAL_INR=100000
            LEVERAGE=1
            SESSION_HOURS=4
            TICK_MINUTES=3
            MAX_SYMBOLS_PER_TICK=1
            RISK_TOLERANCE=moderate
            MAX_PARALLEL_AGENTS=4
          # WATCHLIST intentionally omitted - a comma-separated value here gets
          # mangled by gcloud's own env-var-list parser (which also splits on
          # commas), turning it into a pile of garbage single-symbol env vars.
          # backend/app/config.py's default already has the correct NSE-only
          # 3-symbol watchlist (^NSEI, GOLDBEES.NS, SILVERBEES.NS).
          secrets: |
            ANTHROPIC_API_KEY=anthropic-api-key:latest
          # OPENAI_API_KEY / NEWSAPI_KEY omitted - both secrets exist but have
          # zero versions (never actually populated), and Cloud Run refuses to
          # deploy with a secret reference that has no version to resolve.
          # Both are optional in the app (falls back to Anthropic-only / free
          # RSS news). Add them back here once real values are stored:
          #   printf '%s' "<key>" | gcloud secrets versions add openai-api-key --data-file=-

      # ---------------------------------------------------------------- frontend
      - name: Build frontend image
        run: |
          docker build -f frontend/Dockerfile \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/frontend:latest \
            .

      - name: Push frontend image
        run: docker push --all-tags ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/frontend

      - name: Deploy frontend to Cloud Run
        id: deploy_frontend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --min-instances=1
            --max-instances=2
            --memory=1Gi
            --cpu=1
            --timeout=600
          env_vars_update_strategy: overwrite
          env_vars: |
            BACKEND_URL=${{ steps.deploy_backend.outputs.url }}

      - name: Print deployed URLs
        run: |
          echo "Backend:  ${{ steps.deploy_backend.outputs.url }}"
          echo "Frontend: ${{ steps.deploy_frontend.outputs.url }}"
